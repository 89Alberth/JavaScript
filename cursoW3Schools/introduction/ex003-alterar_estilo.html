<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> que o JavaScript pode fazer ?</h2>

    <p id="demo">JavaScript pode mudar o estilo de um elemento HTML</p>

    <button onclick="document.getElementById('demo').style.fontSize = '40px'">Aumentar fonte</button>

    <button onclick="document.getElementById('demo').style.fontSize = '16px'">Diminuir fonte</button>

    <button onclick="document.getElementById('demo').style.display = 'none'">Ocultar parágrafo</button>

    <button onclick="document.getElementById('demo').style.display = 'block'">Mostrar parágrafo</button>
</body>
</html>
