<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>O que o Js pode fazer ? </h2>
    <p>JavaScript pode trocar o valor de um atributo</p>

    <button onclick="document.getElementById('img').src = '../imagens/ligada.jpg'">Acender</button>

    <img src="../imagens/desligada.jpg" alt="" id="img">
    
    <button onclick="document.getElementById('img').src = '../imagens/desligada.jpg'">Apagar</button>
</body>
</html>
