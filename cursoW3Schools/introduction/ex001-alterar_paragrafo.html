<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar parágrafo</title>
</head>
<body>
    <h2>O que o JavaScript pode fazer ?</h2>

    <p id="demo">Ele pode mudar o conteúdo de um HTML</p>

    <button onclick="document.getElementById('demo').innerHTML = '!!! TEXTO MODIFICADO !!!'">Clique aqui</button>

    <button onclick="document.getElementById('demo').innerHTML = 'Ele pode mudar o conteúdo de um HTML'">Texto original</button>
</body>
</html>
