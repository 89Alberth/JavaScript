<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio de operadores resto da divisão e potência</h1>

    <script>
        //pedir para o usuario digitar um número
        var number1 = prompt('Digite o primeiro número: ')
        //converter em número inteiro
        number1 = parseFloat(number1)
        //pedir para o usuário digitar outro número
        var number2 = prompt('Digite o segundo número: ')
        //converter em número inteiro
        number2 = parseFloat(number2)
        /*mostrar um alert o seguinte texto
        o resto da divisão de n1 por n2 é: resultado
        */
        alert("O resto da divisão de " + number1 + " por " + number2 + " é:  " +  (number1 % number2))
        /*
        mostrar um alert o seguinte texto
        o número n1 elevado a n2 é: resultado
        */
       alert("o número " + number1 + " elevado " + " a " + number2 + " é: " + (number1 ** number2))

    </script>
</body>
</html>
