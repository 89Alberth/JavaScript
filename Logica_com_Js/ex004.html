<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média</title>
</head>
<body>
    <script>
        var nota1 = parseFloat(prompt("Digite a primeira nota: "));

        var nota2 = parseFloat(prompt("Digite a segunda nota: "));

        var media = (nota1 + nota2) / 2;
        
        alert(media > 5);
    </script>
</body>
</html>
