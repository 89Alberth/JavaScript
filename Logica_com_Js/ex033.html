<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
    </style>
</head>

<body>
    <h1>Termos de um contrato</h1>

    <form action="#">
        <textarea name="contrato" id="contrato" cols="30" rows="10" readonly>Todos os contrato devem ser permacido em sigilo e você devera obedecer a todos os tópico</textarea>
        <br>
        <br>

        <label>
            <input type="checkbox" id="chk" > Li e aceito todos os termos.
        </label>
        <br>
        <br>

        <input type="submit" id="btn">
    </form>
    

    


    <script>

        (function(){
            //var referencia do checkbox
            var $chk = document.getElementById('chk');
            //var referencia do botão
            var btn = document.getElementById('btn');
            //chamar função que habilita ou desabilita botao de envio
            changeBtn()
            
            //evento que  habilita botao caso haja uma mudança no checkbox
            $chk.addEventListener('change', function(){
                changeBtn()
            })
            
            //função responsavel por validar checkbox e habilitar botao
            function changeBtn()
            {
                btn.disabled = !$chk.checked;
            }
        })()

</body>
