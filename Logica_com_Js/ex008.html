<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Switch</h1>

    <script>
        var dia = parseInt(prompt("Escolha  um número de 1 à 7 para sabe qual dia da semana é: "))

        switch (dia) {
            case 1:
                alert("Hoje é domingo")
                break;
            case 2:
                alert("Hoje é Segunda-feira")
                break;
            case 3:
                alert("Hoje é terça-feira")
                break;
            case 4:
                alert("Hoje é quarta-feira")
                break;
            case 5:
                alert("Hoje é quinta-feira")
                break;
            case 6:
                alert("Hoje é sexta-feira")
                break;
            case 7:
                alert("Hoje é sábado")
                break;
            default:
                alert("Opção inválida")
                break;
        }
    </script>
</body>
</html>
