<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textarea</title>
</head>
<body>
    <textarea name="msg" id="txtMsg" cols="50" rows="10" style="resize: none;" maxlength="75"></textarea>

    <div>Faltam <span id="resta"></span> caracteres</div>

    <script>
        (function(){
            
            var $txtMsg = document.getElementById('txtMsg');
            var $resta =  document.getElementById('resta');
            var maximo = $txtMsg.maxLength;

            $resta.textContent = maximo;

            $txtMsg.addEventListener('input', checked);

            function checked(){
                var numeroDeLetras = this.value.length;
                $resta.textContent = maximo - numeroDeLetras; 
            }

            

            
        })()    
    </script>
</body>
</html>
