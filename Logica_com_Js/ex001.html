<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio de soma</h1>

    <script>

        //pedir 2 numeros ao usuario
        var n1 = parseFloat(prompt("Digite a primeira nota: "));
        var n2 = parseFloat(prompt("Digite a segunda nota: "));

        // somar a media das duas notas
        var media = (n1 + n2) / 2;

        //Mostrar ao usuário sua nota final
        alert("Sua média é: " + " " + media)

    </script>
</body>
</html>
