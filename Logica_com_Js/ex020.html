<body>
    <h1>Dia da semana</h1>


    <script>
        var dia = new Array ('Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado');

        var hoje = new Date();

        var diaSemana = hoje.getDay();

        dia = dia[diaSemana];

        alert('Olá tudo bem,hoje é ' + dia)

    </script>
</body>
