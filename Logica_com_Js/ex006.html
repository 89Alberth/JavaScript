<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo</title>
</head>
<body>
    <script>
        var player_1 = parseInt(prompt("Jogador 1 escolhe um número: "));

        var player_2 = parseInt(prompt("Jogador 2 escolhe um número: "))

        if (player_1 === player_2) {
            alert("EMPATE")
        }
        else{
            var computer = parseInt( Math.random() * 2)
            
            if (computer === 0) {
                if (player_1 < player_2) {
                    alert("Player 1 ganhou")
                } else{
                    alert("player 2 ganhou")
                }
            }
            else {
                if (player_1 > player_2) {
                    alert("Player 1 ganhou")
                } else {
                    alert("player 2 ganhou")
                }
            }
        }
    </script>
</body>
</html>
