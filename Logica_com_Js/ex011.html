<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
</head>

<body>
    <h1></h1>


    <script>
        var ano = parseInt(prompt("Digite o ano: "));

        while(ano <= 2017) {
            if(ano % 4 === 0) {
                document.write(ano + "<br>")
            }

            ano = ano + 1
        }
    </script>
</body>

</html>
