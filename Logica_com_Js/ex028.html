        <script>
			(function(){

				var trs = document.querySelectorAll('.js-tabela tbody .aluno');
				var x = 0;

				while(trs[x]){
					var aluno = trs[x];
					var dados = aluno.querySelectorAll('td');

					var n1 = nota(dados[1]);
					var n2 = nota(dados[2]);
					var n3 = nota(dados[3]);
					var n4 = nota(dados[4]);

					var media = calcularMedia(n1, n2, n3, n4);

					aluno.querySelector('.aluno-m').textContent = media;

					x++
				}


				function nota(td){
					return parseFloat(td.textContent);
				}
			})()
