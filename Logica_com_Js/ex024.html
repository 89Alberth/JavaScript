<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
    </style>
</head>

<body>
    <h1>Calculadora de imc</h1>
    <button onclick="inicioImc()">Calcular seu imc</button>
    <p id="output"></p>


    <script>
        
        function somaImc(peso, alt){
                var imc = peso / (alt ** 2);
                escrever(imc.toFixed(2));
            }

        function inicioImc(){
            var peso = parseFloat(prompt("Digite seu peso: "));
            var altura = parseFloat(prompt("Digite sua altura: "));
            somaImc(peso,altura);
        }


        function escrever(imc){
            var msg = ''
            if(imc < 17) {
                msg = "Muito abaixo do peso."
            }

            else if(imc < 18.5){
                msg = "Abaixo do peso."
            }

            else if(imc < 25){
                msg = "Peso normal."
            }

            else if(imc < 30){
                msg = "Acima do peso"
            }

            else if(imc < 35){
                msg = "Obesidade grau I"
            }

            else if(imc < 40.1){
                msg = "Obesidade grau II."
            }

            else{
                msg = "Obesidade grau III"
            }

            document.querySelector('#output').innerHTML = 'Seu imc é de: ' + imc + "  <br>  Seu peso é: " +  msg;
        }

        
    </script>
</body>

</html>
