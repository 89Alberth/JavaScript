<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
</head>

<body>
    <h1></h1>


    <script>
        var numero = parseInt(prompt("Digite um número para saber sua tabuada: "));
        var indice = 0;

        while(indice <= 1000) {
            document.write(numero + " x " + indice + " = " + (indice * numero) + "<br>");

            if ((indice % 10) === 0 && indice > 0 ) {
                document.write("<hr>")
            }

            indice += 1;
        }

        document.write("FIM !!!! do loop.")
    </script>
</body>

</html>
