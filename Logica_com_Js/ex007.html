<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Condicional while</h1>
    
    <script>
        var nota1, nota2, media;
        nota1 = parseFloat(prompt("digite a primeira nota: "));
        nota2 = parseFloat(prompt("Digite a segunda nota: "));
        media = (nota1 + nota2) / 2;

        if (nota1 === 0 || nota2 === 0) {
            alert("Uma de suas notas foi 0, por isso você foi reprovado automaticamente.")
        } else {
            if (media >= 6) {
                alert("Parabéns você foi aprovado, nota: " + media)
            } else {
                alert("É uma pena você está reprovado, nota: " + media)
            }
        }
    </script>
</body>
</html>
