<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio de soma</h1>

    <script>
        //pedir 2 numeros ao usuário
        var n1 = parseFloat(prompt("Digite um número"));
        var n2 = parseFloat(prompt("Digite o segundo número: "));

        //mostrar resultado da soma,subtração,divisão e multiplicação
        alert (
            n1 + " + " + n2 + "=" + " " + (n1 + n2) + "\n" +
            n1 + " - " + n2 + "=" + " " + (n1 - n2) + "\n" +
            n1 + " x " + n2 + "=" + " " + (n1 * n2) + "\n" +  
            n1 + " / " + n2 + "=" + " " + (n1 / n2) + "\n"
            )
        

    </script>
</body>
</html>
