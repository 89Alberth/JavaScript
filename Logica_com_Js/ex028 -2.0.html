        <script>
			(function(){
				var trs = document.querySelectorAll('.js-tabela tbody .aluno');
				var x = 0;

				while(trs[x]){
					var aluno = trs[x];

					var tds = aluno.querySelectorAll('td');

					var notas = recuperaNota(tds);

					var media = calcularMedia.apply(this, notas);

					var validarAprovacao = aprovacao(media);

					aluno.querySelector('.aluno-m').textContent = media.toFixed(2);
					aluno.querySelector('.aprovacao').textContent = validarAprovacao;
					
					x++
				}



				function recuperaNota(td){
					var arr = [];
					var x = 0;

					while(td[x]){
						if(!isNaN( td[x].textContent) && td[x].textContent !== ""){
							arr.push(parseFloat(td[x].textContent))
					}
						x++
					}

					return arr;
					
				}




				function aprovacao(media){
				
					if( media >= 6 ){
						return "Aprovado"
					}
					else{
						return "Reprovado"
					}
						
					
					
				}
			})()
