<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios</title>
    <style>
        body{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body>
    <h1>Calculos</h1>

    <button onclick="iniciarCalculo()">Iniciar calculo</button>
    <br>
    <br>

    <button onclick="soma()">+</button>
    <button onclick="subtrair()">-</button>
    <button onclick="dividir()">/</button>
    <button onclick="multiplicar()">x</button>
    <br>
    <br>

    <div id="resultado" style="background-color: black; color: white; padding: 5px; display: inline-block; width: 80px; height: 30px; display: flex;
    justify-content: center;
    align-items: center;"></div>


    <script>
        var n1 = parseFloat(prompt("Digite um número: "));

        function escrever() {
            var output = document.querySelector("#resultado");
            output.innerHTML = n1;
        }

        function soma() {
            var n = parseFloat(prompt("Digite outro número: "));
            n1 = n1 + n;
            escrever()
        }

        function subtrair() {
            var n = parseFloat(prompt("Digite outro número: "));
            n1 = n1 - n;
            escrever()
        }

        function dividir() {
            var n = parseFloat(prompt("Digite outro número: "));
            n1 = n1 / n;
            escrever()
        }

        function multiplicar() {
            var n = parseFloat(prompt("Digite outro número: "));
            n1 = n1 * n;
            escrever()
        }




        

    </script>
</body>

</html>
